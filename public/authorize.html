<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Authorize</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100px;
      margin: 0;
      gap: 12px;
    }
    button {
      padding: 8px 16px;
      background: #0052cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #0041a8; }
    p { font-size: 13px; color: #444; margin: 0; }
  </style>
</head>
<body>
  <p>Allow Better Google Maps to read and update your cards.</p>
  <button id="btn">Authorize</button>
  <script type="module">
    const cfg = await fetch('/api/config').then(r => r.json());
    const t = window.TrelloPowerUp.iframe({
      appKey: cfg.trelloApiKey,
      appName: 'Better Google Maps',
    });

    document.getElementById('btn').addEventListener('click', function () {
      t.getRestApi()
        .authorize({ scope: 'read,write', expiration: 'never' })
        .then(function () {
          t.closePopup();
        })
        .catch(function (err) {
          console.error('Authorization failed', err);
        });
    });
  </script>
</body>
</html>
